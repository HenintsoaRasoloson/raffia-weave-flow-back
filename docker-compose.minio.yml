services:
  minio:
    image: quay.io/minio/minio:RELEASE.2026-06-20T18-00-00Z
    container_name: raffia-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: quay.io/minio/mc:RELEASE.2026-06-16T03-06-00Z
    container_name: raffia-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET_RAW: ${MINIO_BUCKET_RAW:-ged-raw}
      MINIO_BUCKET_RENDERED: ${MINIO_BUCKET_RENDERED:-ged-rendered}
      MINIO_BUCKET_ARCHIVE: ${MINIO_BUCKET_ARCHIVE:-ged-archive}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc mb -p local/$$MINIO_BUCKET_RAW;
      mc mb -p local/$$MINIO_BUCKET_RENDERED;
      mc mb -p local/$$MINIO_BUCKET_ARCHIVE;
      mc anonymous set none local/$$MINIO_BUCKET_RAW;
      mc anonymous set none local/$$MINIO_BUCKET_RENDERED;
      mc anonymous set none local/$$MINIO_BUCKET_ARCHIVE;
      echo 'MinIO buckets initialized successfully.';
      "
    restart: 'no'

volumes:
  minio-data:
